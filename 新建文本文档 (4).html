<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三星题库随机练习系统</title>
    <!-- 引入 SheetJS 用于解析 Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --success: #10b981;
            --error: #ef4444;
            --border: #e5e7eb;
            --warning: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .hidden { display: none; }

        /* 导入界面 */
        .upload-area {
            border: 2px dashed var(--border);
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: #f8fafc;
        }

        h1, h2 { text-align: center; color: var(--primary); }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 15px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: white; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: #eff6ff; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-warning:hover { background: #d97706; }

        /* 练习界面 */
        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progressFill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .q-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 10px;
        }

        .q-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .options-list {
            display: grid;
            gap: 12px;
        }

        .option-item {
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: flex-start;
        }

        .option-item:hover { border-color: var(--primary); background: #f9fafb; }
        .option-item.selected { border-color: var(--primary); background: #eff6ff; }
        
        /* 判题样式 */
        .option-item.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .option-item.wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        .feedback-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .nav-controls button { flex: 1; margin: 0; }

        .stats-info {
            text-align: center;
            margin-top: 20px;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .wrong-count-tag {
            background: #fee2e2;
            color: #ef4444;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 设置界面 -->
    <div id="setupView">
        <h1>🛠 练习系统</h1>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls">
            <div style="font-size: 3rem; margin-bottom: 10px;">📊</div>
            <p id="fileStatus">点击或拖拽上传 Excel 题库文件</p>
            <small style="color: var(--text-sub)">支持“题号、题型、题目内容、选项A-E、正确答案”格式</small>
        </div>

        <div id="actionButtons" class="hidden">
            <div class="stats-info" id="bankInfo">题库加载中...</div>
            <button class="btn btn-primary" onclick="initQuiz('random', 30)">⚡ 随机抽 30 题练习</button>
            <button class="btn btn-outline" onclick="initQuiz('all')">📖 全题库顺序练习</button>
            <button id="wrongPracticeBtn" class="btn btn-warning" onclick="initQuiz('wrong')">
                🔥 错题专项练习 <span id="wrongCountLabel" class="wrong-count-tag">0</span>
            </button>
            
            <div style="margin-top: 30px; text-align: center; border-top: 1px solid #eee; padding-top: 20px;">
                <button onclick="clearSystem()" style="color: #999; border:none; background:none; cursor:pointer; font-size: 0.8rem;">清空所有数据并重新导入</button>
            </div>
        </div>
    </div>

    <!-- 练习界面 -->
    <div id="quizView" class="hidden">
        <div class="progress-bar"><div id="progressFill"></div></div>
        <div class="q-info">
            <span id="qIdx">第 1 题</span>
            <span id="quizModeLabel" style="color:var(--warning); font-weight:bold;"></span>
            <span id="qType" style="background:#e0e7ff; color:#4338ca; padding:2px 8px; border-radius:4px;">单选题</span>
        </div>
        <div id="questionText" class="q-text">题目加载中...</div>
        <div id="optionsContainer" class="options-list"></div>

        <div id="feedbackBox" class="feedback-box">
            <strong id="resultTag">结果</strong>
            <p id="correctAnswerText" style="margin: 5px 0 0 0;"></p>
        </div>

        <div class="nav-controls">
            <button class="btn btn-outline" id="prevBtn" onclick="changeQuestion(-1)">上一题</button>
            <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">提交答案</button>
            <button class="btn btn-outline" id="nextBtn" onclick="changeQuestion(1)">下一题</button>
        </div>
        
        <button class="btn btn-outline" style="margin-top:20px; border-color:#ccc; color:#666;" onclick="exitQuiz()">退出练习</button>
    </div>
</div>

<script>
    let questionBank = []; // 原始题库
    let wrongBank = [];    // 错题库
    let quizList = [];     // 当前练习的题目
    let currentIndex = 0;  // 当前题号
    let userAnswers = {};  // 用户答题记录
    let currentMode = 'all'; // 练习模式

    // 初始化：从缓存加载
    window.onload = () => {
        loadData();
    };

    function loadData() {
        const savedBank = localStorage.getItem('safety_bank_v2');
        if (savedBank) questionBank = JSON.parse(savedBank);

        const savedWrong = localStorage.getItem('safety_wrong_v2');
        if (savedWrong) wrongBank = JSON.parse(savedWrong);

        if (questionBank.length > 0) showReady();
        updateWrongLabel();
    }

    function updateWrongLabel() {
        const label = document.getElementById('wrongCountLabel');
        const btn = document.getElementById('wrongPracticeBtn');
        label.innerText = wrongBank.length;
        btn.disabled = wrongBank.length === 0;
        btn.style.opacity = wrongBank.length === 0 ? "0.5" : "1";
    }

    // 文件读取
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                questionBank = json.map((row, idx) => {
                    const opts = [];
                    if (row['选项A']) opts.push({ id: 'A', text: row['选项A'] });
                    if (row['选项B']) opts.push({ id: 'B', text: row['选项B'] });
                    if (row['选项C']) opts.push({ id: 'C', text: row['选项C'] });
                    if (row['选项D']) opts.push({ id: 'D', text: row['选项D'] });
                    if (row['选项E']) opts.push({ id: 'E', text: row['选项E'] });

                    // 唯一标识符：题目内容+选项A
                    const uid = btoa(unescape(encodeURIComponent(row['题目内容'] + (row['选项A'] || "")))).substring(0, 16);

                    return {
                        uid: uid,
                        id: row['题号'] || (idx + 1),
                        type: row['题型'] || "单选题",
                        content: row['题目内容'],
                        options: opts,
                        answer: String(row['正确答案']).toUpperCase().replace(/[^A-E]/g, ''),
                        isMulti: (row['题型'] === "多选题" || String(row['正确答案']).length > 1)
                    };
                }).filter(q => q.content && q.answer);

                if (questionBank.length > 0) {
                    localStorage.setItem('safety_bank_v2', JSON.stringify(questionBank));
                    showReady();
                    alert(`成功导入 ${questionBank.length} 道题目`);
                } else {
                    alert("未能识别有效题目，请检查 Excel 格式！");
                }
            } catch (err) {
                console.error(err);
                alert("读取失败，请确保文件格式正确");
            }
        };
        reader.readAsArrayBuffer(file);
    };

    function showReady() {
        document.getElementById('actionButtons').classList.remove('hidden');
        document.getElementById('bankInfo').innerText = `已加载题库：${questionBank.length} 题`;
        document.getElementById('fileStatus').innerText = "题库已就绪";
        updateWrongLabel();
    }

    // 初始化练习
    function initQuiz(mode, count) {
        currentIndex = 0;
        userAnswers = {};
        currentMode = mode;
        
        const modeLabels = {
            'random': '⚡ 随机练习',
            'all': '📖 顺序练习',
            'wrong': '🔥 错题消灭'
        };
        document.getElementById('quizModeLabel').innerText = modeLabels[mode];

        if (mode === 'random') {
            quizList = [...questionBank].sort(() => Math.random() - 0.5).slice(0, count);
        } else if (mode === 'wrong') {
            quizList = [...wrongBank].sort(() => Math.random() - 0.5);
        } else {
            quizList = [...questionBank];
        }

        document.getElementById('setupView').classList.add('hidden');
        document.getElementById('quizView').classList.remove('hidden');
        renderQuestion();
    }

    // 渲染题目
    function renderQuestion() {
        const q = quizList[currentIndex];
        const state = userAnswers[currentIndex] || { selected: [], isSubmitted: false };
        
        document.getElementById('qIdx').innerText = `第 ${currentIndex + 1} / ${quizList.length} 题`;
        document.getElementById('qType').innerText = q.isMulti ? "多选题" : "单选题";
        document.getElementById('progressFill').style.width = `${((currentIndex + 1) / quizList.length) * 100}%`;
        document.getElementById('questionText').innerText = q.content;

        const container = document.getElementById('optionsContainer');
        container.innerHTML = "";
        
        q.options.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option-item';
            if (state.selected.includes(opt.id)) div.classList.add('selected');
            
            if (state.isSubmitted) {
                const isCorrect = q.answer.includes(opt.id);
                const isSelected = state.selected.includes(opt.id);
                if (isCorrect) div.classList.add('correct');
                else if (isSelected) div.classList.add('wrong');
            }

            div.innerHTML = `<b style="margin-right:10px">${opt.id}.</b> ${opt.text}`;
            div.onclick = () => selectOption(opt.id);
            container.appendChild(div);
        });

        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === quizList.length - 1;
        
        const subBtn = document.getElementById('submitBtn');
        if (state.isSubmitted) {
            subBtn.disabled = true;
            subBtn.innerText = "已提交";
            showFeedback(q, state);
        } else {
            subBtn.disabled = false;
            subBtn.innerText = "提交答案";
            document.getElementById('feedbackBox').style.display = 'none';
        }
    }

    function selectOption(id) {
        if (userAnswers[currentIndex]?.isSubmitted) return;
        if (!userAnswers[currentIndex]) userAnswers[currentIndex] = { selected: [], isSubmitted: false };

        const q = quizList[currentIndex];
        let sel = userAnswers[currentIndex].selected;

        if (q.isMulti) {
            userAnswers[currentIndex].selected = sel.includes(id) ? sel.filter(x => x !== id) : [...sel, id];
        } else {
            userAnswers[currentIndex].selected = [id];
        }
        renderQuestion();
    }

    function submitAnswer() {
        const state = userAnswers[currentIndex];
        if (!state || state.selected.length === 0) return;
        
        state.isSubmitted = true;
        const q = quizList[currentIndex];
        
        const userStr = state.selected.sort().join('');
        const correctStr = q.answer.split('').sort().join('');
        const isRight = userStr === correctStr;

        if (!isRight) {
            addToWrongBank(q);
        } else if (currentMode === 'wrong') {
            // 在错题练习模式下答对，从错题库移除
            removeFromWrongBank(q.uid);
        }
        
        renderQuestion();
    }

    function addToWrongBank(q) {
        if (!wrongBank.some(item => item.uid === q.uid)) {
            wrongBank.push(q);
            localStorage.setItem('safety_wrong_v2', JSON.stringify(wrongBank));
        }
    }

    function removeFromWrongBank(uid) {
        wrongBank = wrongBank.filter(item => item.uid !== uid);
        localStorage.setItem('safety_wrong_v2', JSON.stringify(wrongBank));
    }

    function showFeedback(q, state) {
        const box = document.getElementById('feedbackBox');
        const tag = document.getElementById('resultTag');
        const ans = document.getElementById('correctAnswerText');
        
        const userStr = state.selected.sort().join('');
        const correctStr = q.answer.split('').sort().join('');
        const isRight = userStr === correctStr;

        box.style.display = 'block';
        box.style.background = isRight ? '#ecfdf5' : '#fef2f2';
        tag.innerText = isRight ? "✅ 回答正确" : "❌ 回答错误";
        tag.style.color = isRight ? "#10b981" : "#ef4444";
        ans.innerText = isRight ? "" : `正确答案是：${q.answer}`;
    }

    function changeQuestion(step) {
        currentIndex += step;
        renderQuestion();
    }

    function exitQuiz() {
        if (confirm("确定要退出练习吗？当前练习进度将丢失。")) {
            document.getElementById('setupView').classList.remove('hidden');
            document.getElementById('quizView').classList.add('hidden');
            updateWrongLabel();
        }
    }

    function clearSystem() {
        if (confirm("这将清空所有导入的题库和错题记录，确定吗？")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>

</body>
</html>
