<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三星题库 - 移动练习版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .hidden { display: none !important; }

        /* 标题和头部 */
        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; margin-top: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-num { display: block; font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 0.8rem; color: var(--text-light); }

        /* 按钮 */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); }
        .btn-warning { background: var(--warning); color: white; }
        .btn-ghost { color: var(--text-light); font-size: 0.9rem; margin-top: 20px; text-decoration: underline; }

        /* 答题区 */
        .progress-container { height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        .q-meta { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 12px; }
        .q-type { background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
        .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; word-wrap: break-word; }

        .option-list { display: grid; gap: 12px; }
        .option {
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: 0.2s;
        }
        .option:active { background: #f8fafc; }
        .option.selected { border-color: var(--primary); background: #eff6ff; }
        .option.correct { border-color: var(--success); background: #ecfdf5; }
        .option.wrong { border-color: var(--error); background: #fef2f2; }

        .feedback {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
        }

        .nav { display: flex; gap: 10px; margin-top: 20px; }
        .nav button { flex: 1; }

        /* 导入区 */
        .upload-card { border: 2px dashed #cbd5e1; padding: 40px 20px; text-align: center; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 首页：导入与模式选择 -->
    <div id="homeView">
        <h1>三星题库练习系统</h1>
        
        <div id="importArea" class="upload-card">
            <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls">
            <div style="font-size: 3rem;">📄</div>
            <p>还没有加载题库</p>
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">点击导入 Excel 文件</button>
        </div>

        <div id="modeArea" class="hidden">
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-num" id="totalCount">0</span>
                    <span class="stat-label">题库总数</span>
                </div>
                <div class="stat-box">
                    <span class="stat-num" id="wrongCount" style="color:var(--error)">0</span>
                    <span class="stat-label">我的错题</span>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="startQuiz('random', 20)">⚡ 随机抽 20 题练习</button>
            <button class="btn btn-outline" onclick="startQuiz('all')">📖 顺序练习全部</button>
            <button id="wrongBtn" class="btn btn-warning" onclick="startQuiz('wrong')">🔥 错题专项强化</button>
            
            <button class="btn btn-ghost" onclick="resetSystem()">重置系统并删除数据</button>
        </div>
    </div>

    <!-- 练习页 -->
    <div id="quizView" class="hidden">
        <div class="progress-container"><div id="progressFill" class="progress-fill"></div></div>
        
        <div class="q-meta">
            <span id="qProgress">1 / 10</span>
            <span id="qTypeLabel" class="q-type">单选题</span>
        </div>

        <div id="qText" class="question-text">题目加载中...</div>
        
        <div id="optList" class="option-list"></div>

        <div id="feedback" class="feedback hidden"></div>

        <div class="nav">
            <button id="prevBtn" class="btn btn-outline" onclick="move(-1)">上一题</button>
            <button id="submitBtn" class="btn btn-primary" onclick="submit()">提交答案</button>
            <button id="nextBtn" class="btn btn-outline hidden" onclick="move(1)">下一题</button>
        </div>

        <button class="btn btn-ghost" style="margin-top:40px;" onclick="backHome()">返回首页</button>
    </div>
</div>

<script>
    // 核心状态
    let db = [];
    let wrongs = [];
    let currentQuiz = [];
    let curIdx = 0;
    let userAnswers = {}; // { index: { sel: [], sub: bool } }

    // 初始化加载
    window.onload = () => {
        const savedDb = localStorage.getItem('safety_db_v3');
        const savedWrongs = localStorage.getItem('safety_wrongs_v3');
        if (savedDb) {
            db = JSON.parse(savedDb);
            wrongs = savedWrongs ? JSON.parse(savedWrongs) : [];
            showHome();
        }
    };

    // 文件导入逻辑
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

                // 统一解析您的标准模板：题号, 题型, 题目内容, 选项A-E, 正确答案
                db = json.map((r, i) => {
                    const opts = [];
                    ['A','B','C','D','E'].forEach(l => {
                        if(r[`选项${l}`]) opts.push({ l, t: r[`选项${l}`] });
                    });
                    
                    // 生成唯一UID，避免重复添加错题
                    const uid = btoa(encodeURIComponent(r['题目内容'] + (r['选项A']||''))).slice(0,20);
                    
                    return {
                        uid,
                        type: r['题型'] || "单选题",
                        content: r['题目内容'],
                        opts: opts,
                        ans: String(r['正确答案']).toUpperCase().replace(/[^A-E]/g, ''),
                        isMulti: String(r['正确答案']).length > 1
                    };
                }).filter(x => x.content && x.ans);

                if (db.length > 0) {
                    localStorage.setItem('safety_db_v3', JSON.stringify(db));
                    showHome();
                } else {
                    alert("文件格式不正确或没有题目");
                }
            } catch (err) {
                alert("导入失败，请确保使用 Excel 文件");
            }
        };
        reader.readAsArrayBuffer(file);
    };

    function showHome() {
        document.getElementById('importArea').classList.add('hidden');
        document.getElementById('modeArea').classList.remove('hidden');
        document.getElementById('totalCount').innerText = db.length;
        document.getElementById('wrongCount').innerText = wrongs.length;
        document.getElementById('wrongBtn').disabled = wrongs.length === 0;
        document.getElementById('homeView').classList.remove('hidden');
        document.getElementById('quizView').classList.add('hidden');
    }

    function startQuiz(mode, count) {
        curIdx = 0;
        userAnswers = {};
        
        if (mode === 'random') {
            currentQuiz = [...db].sort(() => Math.random() - 0.5).slice(0, count);
        } else if (mode === 'wrong') {
            currentQuiz = [...wrongs].sort(() => Math.random() - 0.5);
        } else {
            currentQuiz = [...db];
        }

        document.getElementById('homeView').classList.add('hidden');
        document.getElementById('quizView').classList.remove('hidden');
        render();
    }

    function render() {
        const q = currentQuiz[curIdx];
        const state = userAnswers[curIdx] || { sel: [], sub: false };

        // 进度和UI
        document.getElementById('qProgress').innerText = `${curIdx + 1} / ${currentQuiz.length}`;
        document.getElementById('progressFill').style.width = `${((curIdx + 1) / currentQuiz.length) * 100}%`;
        document.getElementById('qTypeLabel').innerText = q.isMulti ? "多选题" : "单选题";
        document.getElementById('qText').innerText = q.content;

        // 选项
        const list = document.getElementById('optList');
        list.innerHTML = "";
        q.opts.forEach(o => {
            const div = document.createElement('div');
            div.className = 'option';
            if (state.sel.includes(o.l)) div.classList.add('selected');
            
            if (state.sub) {
                if (q.ans.includes(o.l)) div.classList.add('correct');
                else if (state.sel.includes(o.l)) div.classList.add('wrong');
            }

            div.innerHTML = `<b style="color:var(--primary)">${o.l}</b> <span>${o.t}</span>`;
            div.onclick = () => select(o.l);
            list.appendChild(div);
        });

        // 按钮逻辑
        document.getElementById('prevBtn').disabled = (curIdx === 0);
        const subBtn = document.getElementById('submitBtn');
        const nextBtn = document.getElementById('nextBtn');
        const feedback = document.getElementById('feedback');

        if (state.sub) {
            subBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            feedback.classList.remove('hidden');
            const isRight = state.sel.sort().join('') === q.ans.split('').sort().join('');
            feedback.style.background = isRight ? "#ecfdf5" : "#fef2f2";
            feedback.style.color = isRight ? var(--success) : var(--error);
            feedback.innerHTML = isRight ? "✅ 回答正确" : `❌ 错误，正确答案：${q.ans}`;
        } else {
            subBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');
            feedback.classList.add('hidden');
        }
    }

    function select(label) {
        if (userAnswers[curIdx]?.sub) return;
        if (!userAnswers[curIdx]) userAnswers[curIdx] = { sel: [], sub: false };
        
        const q = currentQuiz[curIdx];
        let sel = userAnswers[curIdx].sel;

        if (q.isMulti) {
            userAnswers[curIdx].sel = sel.includes(label) ? sel.filter(x => x !== label) : [...sel, label];
        } else {
            userAnswers[curIdx].sel = [label];
        }
        render();
    }

    function submit() {
        const state = userAnswers[curIdx];
        if (!state || state.sel.length === 0) return;
        state.sub = true;
        
        const q = currentQuiz[curIdx];
        const isRight = state.sel.sort().join('') === q.ans.split('').sort().join('');
        
        // 错题逻辑
        if (!isRight) {
            if (!wrongs.find(w => w.uid === q.uid)) {
                wrongs.push(q);
                localStorage.setItem('safety_wrongs_v3', JSON.stringify(wrongs));
            }
        } else {
            // 如果是错题模式下答对了，移除它
            wrongs = wrongs.filter(w => w.uid !== q.uid);
            localStorage.setItem('safety_wrongs_v3', JSON.stringify(wrongs));
        }
        
        render();
    }

    function move(d) {
        curIdx += d;
        render();
    }

    function backHome() {
        if (confirm("确定要退出练习吗？")) showHome();
    }

    function resetSystem() {
        if (confirm("确定要删除所有题目和错题记录吗？此操作不可撤销。")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>

</body>
</html>
